<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloomAligner · Production Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2F1EE;
  --surface: #FFFFFF;
  --surface2: #F7F6F3;
  --border: #E3E1DC;
  --border-strong: #C9C7C2;
  --text: #1A1916;
  --text2: #6B6861;
  --text3: #A8A5A0;
  --accent: #1B3D6E;
  --accent-light: #EAF0F9;
  --blue: #2563EB;
  --blue-l: #DBEAFE;
  --green: #16A34A;
  --green-l: #DCFCE7;
  --amber: #D97706;
  --amber-l: #FEF3C7;
  --red: #DC2626;
  --red-l: #FEE2E2;
  --gray: #6B7280;
  --gray-l: #F3F4F6;
  --fp: #2563EB;
  --ip: #16A34A;
  --w1: #D97706;
  --w2: #DC2626;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
::selection{background:var(--blue-l);color:var(--blue)}
input,select,textarea,button{font-family:'DM Sans',sans-serif}

/* LAYOUT */
.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--accent);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* SIDEBAR */
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-icon{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.sb-name{font-size:13px;font-weight:600;color:#fff;line-height:1.2}
.sb-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.sb-nav{padding:12px 0;flex:1}
.sb-section{font-size:9px;font-weight:600;letter-spacing:.1em;color:rgba(255,255,255,.35);padding:10px 18px 5px}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 18px;color:rgba(255,255,255,.65);font-size:12px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.sb-link:hover{color:#fff;background:rgba(255,255,255,.06)}
.sb-link.active{color:#fff;background:rgba(255,255,255,.1);border-left-color:rgba(255,255,255,.7)}
.sb-link .ic{width:16px;height:16px;opacity:.7;flex-shrink:0}
.sb-link.active .ic{opacity:1}
.sb-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1)}
.sb-stat{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sb-stat-label{font-size:10px;color:rgba(255,255,255,.4)}
.sb-stat-val{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);font-family:'DM Mono',monospace}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-sub{font-size:12px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:8px;align-items:center}

/* CONTENT */
.content{padding:24px 28px;flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;line-height:1}
.btn:hover{background:var(--surface2);border-color:var(--border-strong)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#152f55;border-color:#152f55}
.btn-danger{color:var(--red);border-color:var(--border)}
.btn-danger:hover{background:var(--red-l);border-color:var(--red)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:6px;border-radius:var(--radius-sm)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-grid-3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.kpi-label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.03em;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:600;line-height:1;font-family:'DM Mono',monospace}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px}
.kpi-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.c-blue{color:var(--blue)}
.c-green{color:var(--green)}
.c-amber{color:var(--amber)}
.c-red{color:var(--red)}
.c-gray{color:var(--gray)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
.card-title{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text3);margin-bottom:14px;text-transform:uppercase}
.card-2col{display:grid;grid-template-columns:1fr 1.5fr;gap:16px;margin-bottom:16px}
.card-2eq{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-fp{background:var(--blue-l);color:var(--blue)}
.badge-ip{background:var(--green-l);color:var(--green)}
.badge-w1{background:var(--amber-l);color:var(--amber)}
.badge-w2{background:var(--red-l);color:var(--red)}
.badge-green{background:var(--green-l);color:var(--green)}
.badge-amber{background:var(--amber-l);color:var(--amber)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-gray{background:var(--gray-l);color:var(--gray)}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-accent{background:var(--accent-light);color:var(--accent)}

/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--text3);border-bottom:2px solid var(--border);white-space:nowrap;background:var(--surface2)}
tbody td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child td{border-bottom:none}
tfoot td{padding:9px 12px;font-weight:600;background:var(--surface2);border-top:2px solid var(--border);font-size:12px}
.td-right{text-align:right;font-family:'DM Mono',monospace}
.td-mono{font-family:'DM Mono',monospace}

/* MINI BAR */
.bar5{display:flex;height:5px;border-radius:3px;overflow:hidden;min-width:60px}

/* PROGRESS */
.prog{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s}

/* FORM */
.form-row{display:grid;gap:12px;margin-bottom:12px}
.form-row-2{grid-template-columns:1fr 1fr}
.form-row-3{grid-template-columns:1fr 1fr 1fr}
.form-row-4{grid-template-columns:1fr 1fr 1fr 1fr}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.02em}
.field input,.field select,.field textarea{
  width:100%;padding:8px 11px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);
  font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field input::placeholder{color:var(--text3)}
.num-inp{width:64px!important;text-align:right;font-family:'DM Mono',monospace;padding:5px 8px!important;font-size:12px!important}
.type-sel{width:66px!important;padding:5px 6px!important;font-size:11px!important}

/* STEP TABLE */
.step-table th:nth-child(3),.step-table th:nth-child(4){width:80px}
.step-table th:nth-child(5){width:55px;text-align:center}
.step-table .done-row{background:#f0fdf4!important}
.diff-pos{font-size:10px;color:var(--red);font-weight:600;margin-left:3px}
.diff-neg{font-size:10px;color:var(--green);font-weight:600;margin-left:3px}

/* SUMMARY BLOCK */
.summary-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sum-item .sl{font-size:10px;color:var(--text3);font-weight:500;margin-bottom:3px}
.sum-item .sv{font-size:20px;font-weight:700;font-family:'DM Mono',monospace}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* FILTER PILLS */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border-strong);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* STEP PROGRESS ROW */
.sp-row{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.sp-row:last-child{border-bottom:none}
.sp-circle{width:18px;height:18px;border-radius:50%;border:2px solid var(--border-strong);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sp-circle.done{background:var(--green);border-color:var(--green)}
.sp-circle.done::after{content:'✓';color:#fff;font-size:9px;font-weight:700}
.sp-name{flex:1;color:var(--text)}
.sp-fru{font-family:'DM Mono',monospace;font-weight:600;font-size:12px;min-width:54px;text-align:right}
.sp-std{font-size:10px;color:var(--text3);min-width:42px;text-align:right}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty h3{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.empty p{font-size:12px;line-height:1.6;max-width:280px;margin:0 auto 18px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal{background:var(--surface);border-radius:12px;width:100%;max-width:860px;box-shadow:var(--shadow-lg);flex-shrink:0}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:15px;font-weight:700}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface2);border-radius:0 0 12px 12px}

/* CHART WRAPPERS */
.chart-wrap{position:relative;width:100%}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-header h2{font-size:16px;font-weight:700}

/* NOTIFICATION */
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;box-shadow:var(--shadow-lg);animation:slideUp .25s ease;display:none}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* VIEW PANEL */
.view-panel{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-lg)}
.view-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.view-header-left{display:flex;align-items:center;gap:12px}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:16px 0}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}

/* CHARTS within cards — no extra padding bleed */
canvas{display:block}
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">
        <div class="sb-icon">BA</div>
        <div>
          <div class="sb-name">BloomAligner</div>
          <div class="sb-sub">Cedarwings · MDR 2017/745</div>
        </div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Navigation</div>
      <div class="sb-link active" data-nav="dashboard" onclick="nav('dashboard')">
        <svg class="ic" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor" opacity=".8"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor" opacity=".5"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor" opacity=".5"/><rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor" opacity=".3"/></svg>
        Tableau de bord
      </div>
      <div class="sb-link" data-nav="cases" onclick="nav('cases')">
        <svg class="ic" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="3" rx="1" fill="currentColor" opacity=".8"/><rect x="2" y="7" width="9" height="2" rx="1" fill="currentColor" opacity=".5"/><rect x="2" y="11" width="6" height="2" rx="1" fill="currentColor" opacity=".3"/></svg>
        Cas patients
      </div>
      <div class="sb-link" data-nav="analysis" onclick="nav('analysis')">
        <svg class="ic" viewBox="0 0 16 16" fill="none"><path d="M2 12 L5 7 L8 9 L11 4 L14 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Analyse FRU
      </div>
      <div class="sb-section">Actions</div>
      <div class="sb-link" onclick="openNew()">
        <svg class="ic" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Nouveau cas
      </div>
      <div class="sb-link" onclick="exportCSV()">
        <svg class="ic" viewBox="0 0 16 16" fill="none"><path d="M4 2h6l4 4v8H4V2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2v4h4M8 8v5M6 11l2 2 2-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Exporter CSV
      </div>
    </nav>
    <div class="sb-footer">
      <div class="sb-stat"><span class="sb-stat-label">Cas total</span><span class="sb-stat-val" id="sb-total">0</span></div>
      <div class="sb-stat"><span class="sb-stat-label">Efficience moy.</span><span class="sb-stat-val" id="sb-eff">—</span></div>
      <div class="sb-stat"><span class="sb-stat-label">Waste ratio</span><span class="sb-stat-val" id="sb-waste">—</span></div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">Tableau de bord</div>
        <div class="topbar-sub" id="topbar-sub">Vue globale de production · <span id="today-date"></span></div>
      </div>
      <div class="topbar-actions">
        <button class="btn" onclick="exportCSV()">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M4 2h6l4 4v8H4V2z" stroke="currentColor" stroke-width="1.5"/><path d="M8 8v5M6 11l2 2 2-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Export CSV
        </button>
        <button class="btn btn-primary" onclick="openNew()">
          + Nouveau cas
        </button>
      </div>
    </header>

    <div class="content" id="content"></div>
  </main>
</div>

<!-- MODAL: New / Edit Case -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nouveau cas</h2>
      <button class="btn btn-sm" onclick="closeModal()">✕ Fermer</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveModal()">Enregistrer le cas</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// DATA & CONSTANTS
// ═══════════════════════════════════════
const STEPS = [
  {id:1, name:"Réception + Case ID",       std:1.5,  type:"IP"},
  {id:2, name:"Vérification input",         std:3,    type:"FP"},
  {id:3, name:"Design traitement",          std:14,   type:"FP"},
  {id:4, name:"Validation plan",            std:4,    type:"IP"},
  {id:5, name:"Génération STL + batch",     std:3,    type:"FP"},
  {id:6, name:"Impression 3D",              std:3,    type:"W2"},
  {id:7, name:"Post-processing",            std:5,    type:"W2"},
  {id:8, name:"Thermoformage",              std:13,   type:"FP"},
  {id:9, name:"Découpe & polissage",        std:20,   type:"FP"},
  {id:10,name:"Contrôle qualité",           std:7,    type:"FP"},
  {id:11,name:"Packaging + étiquetage",     std:5,    type:"IP"},
  {id:12,name:"Préparation livraison",      std:2.5,  type:"IP"},
  {id:13,name:"Suivi / refinements",        std:2,    type:"IP"},
];
const STD_TOTAL = STEPS.reduce((a,s)=>a+s.std,0);
const STATUSES = ["En cours","Terminé","Bloqué","En attente"];
const STATUS_COL = {"En cours":"amber","Terminé":"green","Bloqué":"red","En attente":"gray"};
const TYPE_COLORS = {FP:"#2563EB", IP:"#16A34A", W1:"#D97706", W2:"#DC2626"};
const CHART_GRID = "rgba(0,0,0,.06)";
const TICK = {font:{size:11}, color:"#9CA3AF"};

let state = {page:"dashboard", cases:[], filter:"Tous", editId:null, viewId:null};
let charts = {};

// ═══════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════
function load(){try{const d=localStorage.getItem("ba:v4");if(d)state.cases=JSON.parse(d);}catch(e){}}
function save(){try{localStorage.setItem("ba:v4",JSON.stringify(state.cases));}catch(e){}}
load();

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function newCaseObj(){
  const n = state.cases.length+1;
  const c = {id:Date.now()+"", caseId:"BA-"+String(n).padStart(4,"0"), patient:"", dentist:"", aligners:20, complexity:"Modéré", status:"En cours", createdAt:new Date().toISOString(), steps:{}};
  STEPS.forEach(s=>{c.steps[s.id]={fru:"", type:s.type, done:false, note:""};});
  return c;
}
function getCaseKpis(c){
  let fp=0,ip=0,w1=0,w2=0;
  Object.entries(c.steps).forEach(([sid,sv])=>{
    const v=parseFloat(sv.fru)||0;
    const t=sv.type||(STEPS.find(s=>s.id===+sid)||{}).type||"FP";
    if(t==="FP")fp+=v; else if(t==="IP")ip+=v; else if(t==="W1")w1+=v; else w2+=v;
  });
  const tot=fp+ip+w1+w2;
  const eff=tot>0?Math.round((fp+ip)/tot*100):null;
  const waste=tot>0?Math.round((w1+w2)/tot*100):null;
  const done=Object.values(c.steps).filter(s=>s.done).length;
  return{fp,ip,w1,w2,tot,eff,waste,done};
}
function getGlobalKpis(){
  if(!state.cases.length)return{total:0,avgFru:0,avgEff:null,wasteRatio:null,done:0,inprog:0,blocked:0,fp:0,ip:0,w1:0,w2:0};
  let fp=0,ip=0,w1=0,w2=0,totFru=0;
  state.cases.forEach(c=>{const k=getCaseKpis(c);fp+=k.fp;ip+=k.ip;w1+=k.w1;w2+=k.w2;totFru+=k.tot;});
  const avg=totFru/state.cases.length;
  return{
    total:state.cases.length, avgFru:Math.round(avg*10)/10,
    avgEff:totFru>0?Math.round((fp+ip)/totFru*100):null,
    wasteRatio:totFru>0?Math.round((w1+w2)/totFru*100):null,
    done:state.cases.filter(c=>c.status==="Terminé").length,
    inprog:state.cases.filter(c=>c.status==="En cours").length,
    blocked:state.cases.filter(c=>c.status==="Bloqué").length,
    fp:Math.round(fp), ip:Math.round(ip), w1:Math.round(w1), w2:Math.round(w2)
  };
}
function effColor(e){return e===null?"c-gray":e>=65?"c-green":e>=50?"c-amber":"c-red";}
function wasteColor(w){return w===null?"c-gray":w<=35?"c-green":w<=45?"c-amber":"c-red";}
function badge(label,cls){return`<span class="badge badge-${cls}">${label}</span>`;}
function statusBadge(s){return badge(s,STATUS_COL[s]||"gray");}
function complexBadge(cx){const m={Simple:"green",Modéré:"amber",Complexe:"red"};return badge(cx,m[cx]||"gray");}
function bar5(fp,ip,w1,w2){const t=fp+ip+w1+w2||1;return`<div class="bar5"><div style="width:${fp/t*100}%;background:${TYPE_COLORS.FP}"></div><div style="width:${ip/t*100}%;background:${TYPE_COLORS.IP}"></div><div style="width:${w1/t*100}%;background:${TYPE_COLORS.W1}"></div><div style="width:${w2/t*100}%;background:${TYPE_COLORS.W2}"></div></div>`;}
function mono(v){return`<span class="td-mono">${v}</span>`;}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",2500);}
function kpi(label,val,sub,colCls="",extraStyle=""){
  return`<div class="kpi"${extraStyle?` style="${extraStyle}"`:""}><div class="kpi-label">${label}</div><div class="kpi-val ${colCls}">${val}</div>${sub?`<div class="kpi-sub">${sub}</div>`:""}</div>`;
}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}
function legend(...pairs){return`<div class="legend">${pairs.map(([l,c])=>`<span class="legend-item"><span class="legend-dot" style="background:${c}"></span>${l}</span>`).join("")}</div>`;}

const PAGE_TITLES = {dashboard:"Tableau de bord", cases:"Cas patients", analysis:"Analyse FRU"};
function nav(page){

  document.querySelectorAll(".sb-link[data-nav]").forEach(el=>el.classList.toggle("active",el.dataset.nav===page));

}
function setDate(){
  const el=document.getElementById("today-date");
  if(el)el.textContent=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}

function render(){

function buildStepChart(canvasId, cases){
  const el=document.getElementById(canvasId);
  if(!el)return;
  const fp=[],ip=[],w1=[],w2=[];
  STEPS.forEach(s=>{
    let f=0,i=0,ww=0,x=0;
    cases.forEach(c=>{const sv=c.steps[s.id];if(!sv?.fru)return;const v=parseFloat(sv.fru)||0;const t=sv.type||s.type;if(t==="FP")f+=v;else if(t==="IP")i+=v;else if(t==="W1")ww+=v;else x+=v;});
    const n=cases.length||1;fp.push(+(f/n).toFixed(1));ip.push(+(i/n).toFixed(1));w1.push(+(ww/n).toFixed(1));w2.push(+(x/n).toFixed(1));
  });
  const ch=new Chart(el,{type:"bar",data:{labels:STEPS.map(s=>"S"+s.id),datasets:[{label:"FP",data:fp,backgroundColor:"#2563EB"},{label:"IP",data:ip,backgroundColor:"#16A34A"},{label:"W1",data:w1,backgroundColor:"#D97706"},{label:"W2",data:w2,backgroundColor:"#DC2626"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{color:CHART_GRID},ticks:TICK},y:{stacked:true,grid:{color:CHART_GRID},ticks:TICK}}}});
  charts[canvasId]=ch;
}

function renderAnalysis(){
  const ce=document.getElementById("content");
  const k=getGlobalKpis();
  if(!state.cases.length){
    ce.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><h3>Aucune donnée à analyser</h3><p>Saisissez des temps FRU dans vos cas pour voir l'analyse détaillée.</p><button class="btn btn-primary" onclick="openNew()">+ Créer un cas</button></div>`;
    return;
  }
  const rows=STEPS.map(s=>{
    let fp=0,ip=0,w1=0,w2=0,cnt=0;
    state.cases.forEach(c=>{const sv=c.steps[s.id];if(!sv?.fru)return;const v=parseFloat(sv.fru)||0;const t=sv.type||s.type;if(t==="FP")fp+=v;else if(t==="IP")ip+=v;else if(t==="W1")w1+=v;else w2+=v;cnt++;});
    const tot=fp+ip+w1+w2;const avg=cnt?tot/cnt:0;const diff=avg>0?avg-s.std:null;const waste=avg>0?Math.round((w1+w2)/avg*100):null;
    return{s,fp,ip,w1,w2,avg,diff,waste,cnt};
  });

  ce.innerHTML=`
    <div class="kpi-grid">
      ${kpi("FP total",k.fp+" FRU","Temps direct productif","c-blue")}
      ${kpi("IP total",k.ip+" FRU","Temps indirect productif","c-green")}
      ${kpi("W1 total",k.w1+" FRU","Gaspillage variable — réductible","c-amber")}
      ${kpi("W2 total",k.w2+" FRU","Gaspillage structurel","c-red")}
    </div>
    <div class="card-2eq">
      <div class="card" style="margin-bottom:0">
        <div class="card-title">FRU moyen par étape</div>
        ${legend(["FP",TYPE_COLORS.FP],["IP",TYPE_COLORS.IP],["W1",TYPE_COLORS.W1],["W2",TYPE_COLORS.W2])}
        <div class="chart-wrap" style="height:220px"><canvas id="c-astep"></canvas></div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="card-title">Waste par étape (%)</div>
        <div class="chart-wrap" style="height:260px"><canvas id="c-waste"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-title">Tableau détaillé par étape</div>
      <div class="table-wrap"><table>
        <thead><tr><th>#</th><th>Étape</th><th class="td-right">Std FRU</th><th class="td-right">Moy réel</th><th class="td-right">Écart</th><th class="td-right">Waste %</th><th class="td-right">Cas saisis</th><th style="min-width:80px">Composition</th></tr></thead>
        <tbody>${rows.map(r=>`<tr>
          <td style="font-size:10px;color:var(--text3)">${r.s.id}</td>
          <td>${r.s.name}</td>
          <td class="td-right td-mono" style="color:var(--text3)">${r.s.std}</td>
          <td class="td-right td-mono" style="font-weight:600">${r.avg>0?r.avg.toFixed(1):'<span style="color:var(--text3)">—</span>'}</td>
          <td class="td-right"><span class="${r.diff===null?"":""}${r.diff===null?"td-mono":r.diff>0?"diff-pos":"diff-neg"}">${r.diff!==null?(r.diff>0?"+":"")+r.diff.toFixed(1):"—"}</span></td>
          <td class="td-right"><span class="${r.waste===null?"":r.waste>50?"c-red":r.waste>30?"c-amber":"c-green"}" style="font-family:'DM Mono',monospace;font-weight:600">${r.waste!==null?r.waste+"%":"—"}</span></td>
          <td class="td-right" style="color:var(--text3)">${r.cnt}</td>
          <td>${r.avg>0?bar5(r.fp/r.cnt,r.ip/r.cnt,r.w1/r.cnt,r.w2/r.cnt):'<span style="color:var(--text3);font-size:10px">—</span>'}</td>
        </tr>`).join("")}</tbody>

    }
  },40);
}

  if(!c)return;
  _working=JSON.parse(JSON.stringify(c)); state.editId=id;
  document.getElementById("modal-title").textContent="Éditer — "+c.caseId;
  buildModalBody();
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
  _working=null; state.editId=null;
}
function saveModal(){
  if(!_working)return;
  const idx=state.cases.findIndex(x=>x.id===_working.id);
  if(idx>=0)state.cases[idx]=_working;else state.cases.push(_working);
  save(); closeModal(); toast("Cas enregistré ✓"); render();
}

function buildModalBody(){
  const c=_working;
  const k=getCaseKpis(c);
  const eff=k.eff!==null?k.eff+"%":"—";
  const diffV=k.tot>0?(k.tot>STD_TOTAL?"+":"")+Math.round((k.tot-STD_TOTAL)*10)/10:null;
  
  document.getElementById("modal-body").innerHTML=`
    <div class="form-row form-row-4" style="margin-bottom:14px">
      <div class="field"><label>Case ID</label><input type="text" value="${c.caseId}" onchange="mUpd('caseId',this.value)"></div>
      <div class="field"><label>Statut</label><select onchange="mUpd('status',this.value)">${STATUSES.map(s=>`<option${s===c.status?" selected":""}>${s}</option>`).join("")}</select></div>
      <div class="field"><label>Patient (réf.)</label><input type="text" value="${c.patient}" placeholder="Référence patient" onchange="mUpd('patient',this.value)"></div>
      <div class="field"><label>Praticien</label><input type="text" value="${c.dentist}" placeholder="Nom du dentiste" onchange="mUpd('dentist',this.value)"></div>
    </div>
    <div class="form-row form-row-4" style="margin-bottom:16px">
      <div class="field"><label>Nombre d'aligneurs</label><input type="number" min="4" max="60" value="${c.aligners}" onchange="mUpd('aligners',+this.value)"></div>
      <div class="field"><label>Complexité</label><select onchange="mUpd('complexity',this.value)">${["Simple","Modéré","Complexe"].map(s=>`<option${s===c.complexity?" selected":""}>${s}</option>`).join("")}</select></div>
      <div class="field" style="grid-column:span 2"><label>Note générale</label><input type="text" value="${c.note||""}" placeholder="Remarques sur le cas..." onchange="mUpd('note',this.value)"></div>
    </div>
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:14px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
        <div class="sum-item"><div class="sl">Total FRU saisi</div><div class="sv" id="s-tot">${k.tot.toFixed(1)}</div></div>
        <div class="sum-item"><div class="sl">Standard</div><div class="sv" style="color:var(--text3)">${STD_TOTAL}</div></div>
        <div class="sum-item"><div class="sl">Efficience</div><div class="sv ${effColor(k.eff)}" id="s-eff">${eff}</div></div>
        <div class="sum-item"><div class="sl">vs Standard</div><div class="sv ${k.tot>0?(k.tot>STD_TOTAL?"c-red":"c-green"):""}" id="s-diff">${diffV!==null?diffV:"—"}</div></div>
      </div>
    </div>
    <div style="font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--text3);margin-bottom:10px;text-transform:uppercase">Temps par étape · 1 FRU = 5 minutes</div>
    <div class="table-wrap" style="max-height:340px;overflow-y:auto">
    <table class="step-table">
      <thead><tr>
        <th style="width:28px">#</th><th>Étape</th>
        <th style="width:60px">Std</th>
        <th>FRU réel</th>
        <th>Type</th>
        <th style="width:50px;text-align:center">Fait</th>
        <th>Note</th>
      </tr></thead>
      <tbody id="steps-body">
        ${buildStepRows(c)}
      </tbody>
    </table>
    </div>`;
}

function buildStepRows(c){
  return STEPS.map(s=>{
    const sv=c.steps[s.id]||{fru:"",type:s.type,done:false,note:""};
    const fv=parseFloat(sv.fru)||0;
    const diff=fv>0?fv-s.std:null;
    return`<tr class="${sv.done?"done-row":""}">
      <td style="color:var(--text3);font-size:10px">${s.id}</td>
      <td style="font-size:12px">${s.name}</td>
      <td class="td-right" style="color:var(--text3);font-family:'DM Mono',monospace;font-size:11px">${s.std}</td>
      <td>
        <div style="display:flex;align-items:center;gap:5px">
          <input class="num-inp" type="number" min="0" step="0.5" value="${sv.fru}" placeholder="${s.std}" onchange="mUpdStep(${s.id},'fru',this.value)">
          ${diff!==null?`<span class="${diff>0?"diff-pos":"diff-neg"}">${diff>0?"+":""}${diff.toFixed(1)}</span>`:""}
        </div>
      </td>
      <td>
        <select class="type-sel" onchange="mUpdStep(${s.id},'type',this.value)">
          ${["FP","IP","W1","W2"].map(t=>`<option${t===sv.type?" selected":""}>${t}</option>`).join("")}
        </select>
      </td>
      <td style="text-align:center">
        <input type="checkbox" ${sv.done?"checked":""} onchange="mUpdStep(${s.id},'done',this.checked)">
      </td>
      <td>
        <input type="text" style="width:100%;padding:4px 7px;font-size:11px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text)" value="${sv.note||""}" placeholder="..." onchange="mUpdStep(${s.id},'note',this.value)">
      </td>
    </tr>`;
  }).join("");
}

function mUpd(k,v){if(!_working)return;_working[k]=v;refreshModalSummary();}
function mUpdStep(sid,field,val){
  if(!_working)return;
  _working.steps[sid]={..._working.steps[sid],[field]:val};
  // update row background for done
  refreshStepsBody();
  refreshModalSummary();
}
function refreshModalSummary(){
  const k=getCaseKpis(_working);
  const el_tot=document.getElementById("s-tot");
  const el_eff=document.getElementById("s-eff");
  const el_diff=document.getElementById("s-diff");
  if(el_tot)el_tot.textContent=k.tot.toFixed(1);
  if(el_eff){el_eff.textContent=k.eff!==null?k.eff+"%":"—";el_eff.className="sv "+effColor(k.eff);}
  if(el_diff){
    const diffV=k.tot>0?(k.tot>STD_TOTAL?"+":"")+Math.round((k.tot-STD_TOTAL)*10)/10:null;
    el_diff.textContent=diffV!==null?diffV:"—";
    el_diff.className="sv "+(k.tot>0?(k.tot>STD_TOTAL?"c-red":"c-green"):"");
  }
}
function refreshStepsBody(){
  const sb=document.getElementById("steps-body");
  if(sb)sb.innerHTML=buildStepRows(_working);
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function setFilter(f){state.filter=f;renderCases();}
function delCase(id){
  if(!confirm("Supprimer ce cas ? Cette action est irréversible."))return;
  state.cases=state.cases.filter(c=>c.id!==id);
  save(); toast("Cas supprimé"); state.viewId=null; render();
}
function exportCSV(){
  if(!state.cases.length){alert("Aucun cas à exporter.");return;}
  const headers=["Case ID","Patient","Praticien","Aligneurs","Complexité","Statut","Créé le","FRU Total","Min Total","Efficience%","Waste%","Étapes faites",...STEPS.map(s=>"S"+s.id+" FRU"),...STEPS.map(s=>"S"+s.id+" Type")];
  const rows=state.cases.map(c=>{
    const k=getCaseKpis(c);
    return [c.caseId,c.patient,c.dentist,c.aligners,c.complexity,c.status,new Date(c.createdAt).toLocaleDateString("fr-FR"),k.tot.toFixed(1),Math.round(k.tot*5),k.eff!==null?k.eff:"",k.waste!==null?k.waste:"",(k.done),...STEPS.map(s=>c.steps[s.id]?.fru||""),...STEPS.map(s=>c.steps[s.id]?.type||s.type)];
  });
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="bloomaligner_"+new Date().toISOString().slice(0,10)+".csv";a.click();
  toast("Export CSV téléchargé ✓");
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
setDate();
render();
</script>
</body>
</html>
